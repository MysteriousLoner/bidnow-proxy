<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BidNow Property Admin</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif;
            background: #f5f5f5;
            color: #333;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        /* ===== Login Screen ===== */
        .login-screen {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
        }

        .login-card {
            background: white;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
        }

        .login-card h1 {
            margin-bottom: 30px;
            text-align: center;
            color: #10b981;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #10b981;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: #10b981;
            color: white;
        }

        .btn-primary:hover {
            background: #0d9488;
        }

        .btn-danger {
            background: #f56565;
            color: white;
            margin-top: 10px;
        }

        .btn-danger:hover {
            background: #e53e3e;
        }

        .error {
            color: #f56565;
            padding: 12px;
            background: #fff5f5;
            border-radius: 4px;
            margin-bottom: 20px;
            border-left: 4px solid #f56565;
        }

        .success {
            color: #38a169;
            padding: 12px;
            background: #f0fff4;
            border-radius: 4px;
            margin-bottom: 20px;
            border-left: 4px solid #38a169;
        }

        /* ===== Admin Dashboard ===== */
        .dashboard {
            display: none;
        }

        .header {
            background: white;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            color: #10b981;
            font-size: 24px;
        }

        .user-info {
            text-align: right;
        }

        .user-info p {
            margin-bottom: 10px;
            font-size: 14px;
            color: #666;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
        }

        .stat-card .label {
            font-size: 12px;
            text-transform: uppercase;
            color: #999;
            margin-bottom: 8px;
        }

        .stat-card .value {
            font-size: 28px;
            font-weight: bold;
            color: #10b981;
        }

        .properties-section {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
        }

        .properties-section h2 {
            margin-bottom: 20px;
            color: #333;
        }

            .search-container {
                margin-bottom: 20px;
                display: flex;
                gap: 10px;
            }

            .search-input {
                flex: 1;
                padding: 12px;
                border: 1px solid #ddd;
                border-radius: 4px;
                font-size: 14px;
                transition: border-color 0.3s;
            }

            .search-input:focus {
                outline: none;
                border-color: #10b981;
                box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.1);
            }

            .search-results-info {
                font-size: 12px;
                color: #666;
                padding: 8px 0;
                margin-bottom: 12px;
            }

        .properties-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }

        .property-card {
            border: 1px solid #eee;
            border-radius: 8px;
            overflow: hidden;
            transition: box-shadow 0.3s;
        }

        .property-card:hover {
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
        }

        .property-image {
            width: 100%;
            height: 200px;
            object-fit: cover;
            background: #f0f0f0;
        }

        .property-info {
            padding: 15px;
        }

        .property-location {
            font-weight: 600;
            margin-bottom: 8px;
            color: #333;
            word-break: break-word;
        }

        .property-details {
            font-size: 12px;
            color: #666;
            margin-bottom: 12px;
            line-height: 1.5;
        }

        .property-details span {
            display: block;
            margin-bottom: 4px;
        }

        .photo-upload {
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid #eee;
        }

        .file-input-wrapper {
            position: relative;
            overflow: hidden;
            display: inline-block;
            width: 100%;
        }

        .file-input-wrapper input[type=file] {
            position: absolute;
            left: -9999px;
        }

        .file-input-label {
            display: block;
            padding: 8px;
            background: #f0f0f0;
            border-radius: 4px;
            text-align: center;
            cursor: pointer;
            font-size: 12px;
            transition: background 0.3s;
        }

        .file-input-label:hover {
            background: #e0e0e0;
        }

        .property-actions {
            display: flex;
            gap: 8px;
            margin-top: 8px;
        }

        .property-actions button {
            flex: 1;
            padding: 8px;
            font-size: 12px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-upload {
            background: #10b981;
            color: white;
        }

        .btn-upload:hover {
            background: #0d9488;
        }

        .btn-delete-image {
            background: #fed7d7;
            color: #f56565;
        }

        .btn-delete-image:hover {
            background: #fc8787;
            color: white;
        }

        .loading {
            text-align: center;
            color: #999;
            padding: 20px;
        }

        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #10b981;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #999;
        }

        .empty-state svg {
            width: 64px;
            height: 64px;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        .hidden {
            display: none !important;
        }

        @media (max-width: 768px) {
            .properties-grid {
                grid-template-columns: 1fr;
            }

            .header {
                flex-direction: column;
                gap: 15px;
            }

            .header h1 {
                font-size: 18px;
            }

            .user-info {
                text-align: left;
            }
        }
    </style>
</head>
<body>

<!-- Login Screen -->
<div class="login-screen" id="loginScreen">
    <div class="login-card">
        <h1>BidNow Admin</h1>
        <div id="loginError" class="error hidden"></div>
        <form id="loginForm" onsubmit="handleLogin(event)">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required autofocus>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required>
            </div>
            <button type="submit" class="btn btn-primary">Login</button>
        </form>
    </div>
</div>

<!-- Dashboard -->
<div class="dashboard" id="dashboard">
    <div class="header">
        <h1>Property Management</h1>
        <div class="user-info">
            <p>Logged in as <strong>admin</strong></p>
            <button class="btn btn-danger" onclick="handleLogout()">Logout</button>
        </div>
    </div>

    <div id="dashboardMessage"></div>

    <div class="stats">
        <div class="stat-card">
            <div class="label">Total Properties</div>
            <div class="value" id="totalProperties">0</div>
        </div>
        <div class="stat-card">
            <div class="label">Custom Photos</div>
            <div class="value" id="customPhotos">0</div>
        </div>
        <div class="stat-card">
            <div class="label">Missing Photos</div>
            <div class="value" id="missingPhotos">0</div>
        </div>
    </div>

    <div class="properties-section">
        <h2>Properties with Photo Upload</h2>
            <div class="search-container">
                <input type="text" id="searchInput" class="search-input" placeholder="Search by property location...">
            </div>
            <div id="searchResults" class="search-results-info" style="display: none;"></div>
        <div id="propertiesContainer">
            <div class="loading">
                <div class="spinner"></div>
                <p>Loading properties...</p>
            </div>
        </div>
    </div>
</div>

<script>
const API_BASE = `${window.location.origin}/admin`;
let sessionToken = localStorage.getItem("bidnow_session");
let allProperties = [];
let filteredProperties = [];

// Initialize page
window.addEventListener("load", () => {
    if (sessionToken && auth.verify_session(sessionToken)) {
        showDashboard();
        // Setup search listener
        document.getElementById("searchInput").addEventListener("input", handleSearch);
        loadProperties();
    } else {
        showLogin();
    }
});

function showLogin() {
    document.getElementById("loginScreen").style.display = "flex";
    document.getElementById("dashboard").style.display = "none";
}

function showDashboard() {
    document.getElementById("loginScreen").style.display = "none";
    document.getElementById("dashboard").style.display = "block";
}

async function handleLogin(event) {
    event.preventDefault();
    
    const username = document.getElementById("username").value;
    const password = document.getElementById("password").value;
    const errorEl = document.getElementById("loginError");
    
    try {
        const response = await fetch(`${API_BASE}/login`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ username, password })
        });
        
        const data = await response.json();
        
        if (!data.ok) {
            errorEl.textContent = data.error || "Login failed";
            errorEl.classList.remove("hidden");
            return;
        }
        
        sessionToken = data.session_token;
        localStorage.setItem("bidnow_session", sessionToken);
        
        document.getElementById("loginForm").reset();
        errorEl.classList.add("hidden");
        
        showDashboard();
        loadProperties();
    } catch (error) {
        errorEl.textContent = `Error: ${error.message}`;
        errorEl.classList.remove("hidden");
    }
}

async function handleLogout() {
    try {
        await fetch(`${API_BASE}/logout`, {
            method: "POST",
            headers: { "Authorization": `Bearer ${sessionToken}` }
        });
    } catch (error) {
        console.error("Logout error:", error);
    }
    
    sessionToken = null;
    localStorage.removeItem("bidnow_session");
    showLogin();
}

async function loadProperties() {
    const container = document.getElementById("propertiesContainer");
    container.innerHTML = '<div class="loading"><div class="spinner"></div><p>Loading properties...</p></div>';
    
    try {
        const response = await fetch(`${API_BASE}/properties?session=${sessionToken}`);
        const data = await response.json();
        
        if (!data.ok) {
            container.innerHTML = `<div class="error">${data.error}</div>`;
            return;
        }
        
        allProperties = data.properties || [];
        
        // Update stats
        const withCustom = allProperties.filter(p => p.custom_image).length;
        document.getElementById("totalProperties").textContent = data.count;
        document.getElementById("customPhotos").textContent = withCustom;
        document.getElementById("missingPhotos").textContent = data.count - withCustom;
        
        if (allProperties.length === 0) {
            container.innerHTML = `
                <div class="empty-state">
                    <p>No properties found. Run a sync from the API first.</p>
                </div>
            `;
            return;
        }
        
        renderProperties();
    } catch (error) {
        container.innerHTML = `<div class="error">Error loading properties: ${error.message}</div>`;
    }
}

function handleSearch(event) {
    const query = event.target.value.toLowerCase().trim();
    const resultsDiv = document.getElementById("searchResults");
    
    if (query === "") {
        // Show all properties
        filteredProperties = [...allProperties];
        resultsDiv.style.display = "none";
    } else {
        // Filter properties by location
        filteredProperties = allProperties.filter(property => 
            property.location.toLowerCase().includes(query)
        );
        resultsDiv.style.display = "block";
        resultsDiv.textContent = `Found ${filteredProperties.length} of ${allProperties.length} properties`;
    }
    
    renderProperties();
}

function renderProperties() {
    const container = document.getElementById("propertiesContainer");
    
    const grid = document.createElement("div");
    grid.className = "properties-grid";
    
    // Use filteredProperties if a search is active, otherwise use allProperties
    const propertiesToShow = document.getElementById("searchResults").style.display === "none" ? allProperties : filteredProperties;
    
    if (propertiesToShow.length === 0) {
        container.innerHTML = `<div class="empty-state"><p>No properties found</p></div>`;
        return;
    }
    
    propertiesToShow.forEach((property, index) => {
        const card = document.createElement("div");
        card.className = "property-card";
        
        const customImage = property.custom_image;
        const imageSrc = customImage 
            ? `${window.location.origin}/api/asset/custom/${customImage}`
            : `${window.location.origin}/api/asset/property-placeholder.svg`;
        
        card.innerHTML = `
            <img src="${imageSrc}" alt="Property" class="property-image" 
                 onerror="this.src='${window.location.origin}/api/asset/property-placeholder.svg'">
            <div class="property-info">
                <div class="property-location" title="${property.location}">
                    ${property.location.substring(0, 50)}${property.location.length > 50 ? '...' : ''}
                </div>
                <div class="property-details">
                    <span><strong>Price:</strong> ${property.price}</span>
                    <span><strong>Auction:</strong> ${property.auction_date}</span>
                    ${customImage ? `<span style="color: #38a169;"><strong>✓ Custom photo</strong></span>` : ''}
                </div>
                <div class="photo-upload">
                    <div class="file-input-wrapper">
                        <label class="file-input-label">
                            📸 Choose Photo
                            <input type="file" accept="image/*" 
                                   onchange="handlePhotoUpload(event, '${property.url}')">
                        </label>
                    </div>
                    ${customImage ? `
                        <div class="property-actions">
                            <button class="btn-delete-image" onclick="deleteCustomImage('${property.url}', ${index})">
                                Delete Photo
                            </button>
                        </div>
                    ` : ''}
                </div>
            </div>
        `;
        
        grid.appendChild(card);
    });
    
    container.innerHTML = "";
    container.appendChild(grid);
}

async function handlePhotoUpload(event, propertyUrl) {
    const file = event.target.files[0];
    if (!file) return;
    
    // Validate file size (5MB max)
    const maxSize = 5 * 1024 * 1024;
    if (file.size > maxSize) {
        showMessage("File too large. Maximum 5MB.", "error");
        return;
    }
    
    const formData = new FormData();
    formData.append("photo", file);
    formData.append("property_url", propertyUrl);
    
    const button = event.target;
    button.disabled = true;
    const label = button.parentElement;
    const originalText = label.textContent;
    label.textContent = "Uploading...";
    
    try {
        const response = await fetch(`${API_BASE}/upload-photo?session=${sessionToken}`, {
            method: "POST",
            body: formData
        });
        
        const data = await response.json();
        
        if (!data.ok) {
            showMessage(`Upload failed: ${data.error}`, "error");
        } else {
            showMessage("Photo uploaded successfully!", "success");
            await loadProperties();
        }
    } catch (error) {
        showMessage(`Error: ${error.message}`, "error");
    } finally {
        button.disabled = false;
        label.textContent = originalText;
        event.target.value = "";
    }
}

async function deleteCustomImage(propertyUrl, index) {
    if (!confirm("Delete this custom photo?")) return;
    
    try {
        const response = await fetch(`${API_BASE}/custom-image/0?url=${encodeURIComponent(propertyUrl)}&session=${sessionToken}`, {
            method: "DELETE"
        });
        
        const data = await response.json();
        
        if (data.ok) {
            showMessage("Photo deleted successfully!", "success");
            await loadProperties();
        } else {
            showMessage(`Delete failed: ${data.error}`, "error");
        }
    } catch (error) {
        showMessage(`Error: ${error.message}`, "error");
    }
}

function showMessage(text, type) {
    const container = document.getElementById("dashboardMessage");
    const messageEl = document.createElement("div");
    messageEl.className = type === "error" ? "error" : "success";
    messageEl.textContent = text;
    
    container.innerHTML = "";
    container.appendChild(messageEl);
    
    setTimeout(() => {
        messageEl.remove();
    }, 5000);
}

// Simple session verification mock
const auth = {
    verify_session: (token) => {
        return !!token;
    }
};
</script>

</body>
</html>
